name: ACEest CI

on:
  push:
  pull_request:

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and lint
        run: python -m py_compile app.py

      - name: Build Docker image
        run: docker build -t aceest-fitness-app:ci .

      - name: Run pytest locally
        run: python -m pytest tests/test_app.py -q

      - name: Run pytest inside Docker image
        run: docker run --rm aceest-fitness-app:ci python -m pytest tests/test_app.py -q
